<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude-drive Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0d1117; color: #c9d1d9; padding: 16px;
    }
    h1 { color: #58a6ff; margin-bottom: 16px; font-size: 1.4em; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .panel {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 16px; min-height: 200px;
    }
    .panel h2 { color: #8b949e; font-size: 0.9em; text-transform: uppercase; margin-bottom: 12px; }
    .operator-card {
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      padding: 12px; margin-bottom: 8px;
    }
    .operator-card .name { color: #58a6ff; font-weight: bold; }
    .operator-card .role { color: #8b949e; font-size: 0.85em; }
    .operator-card .task { color: #c9d1d9; font-size: 0.9em; margin-top: 4px; }
    .operator-card .status {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 0.75em; font-weight: bold;
    }
    .status-active { background: #1f6feb33; color: #58a6ff; }
    .status-background { background: #8b949e33; color: #8b949e; }
    .status-completed { background: #23863633; color: #3fb950; }
    .status-failed { background: #da363333; color: #f85149; }
    .status-verifying { background: #d29922aa; color: #e3b341; }
    .status-paused { background: #8b949e33; color: #8b949e; }
    .activity-item {
      padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 0.85em;
    }
    .activity-item .time { color: #484f58; font-size: 0.8em; margin-right: 6px; }
    .activity-item .agent-tag { color: #58a6ff; font-weight: bold; margin-right: 4px; }
    .cost-bar {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 16px; display: flex;
      justify-content: space-between; align-items: center;
    }
    .cost-value { color: #3fb950; font-size: 1.2em; font-weight: bold; }
    .cost-label { color: #8b949e; font-size: 0.85em; }
    .mode-badge {
      background: #1f6feb33; color: #58a6ff; padding: 4px 12px;
      border-radius: 12px; font-size: 0.85em;
    }
    #connection-status {
      position: fixed; top: 8px; right: 16px; font-size: 0.75em;
      padding: 4px 8px; border-radius: 4px;
    }
    .connected { background: #23863633; color: #3fb950; }
    .disconnected { background: #da363333; color: #f85149; }
    .empty-state { color: #484f58; font-style: italic; padding: 20px 0; text-align: center; }
  </style>
</head>
<body>
  <div id="connection-status" class="disconnected">Disconnected</div>
  <h1>claude-drive</h1>

  <div class="cost-bar">
    <div>
      <div class="cost-label">Session Cost</div>
      <div class="cost-value" id="session-cost">$0.00</div>
    </div>
    <div>
      <div class="cost-label">Tokens</div>
      <div id="token-count" style="color: #c9d1d9;">0</div>
    </div>
    <div>
      <div class="cost-label">Mode</div>
      <div class="mode-badge" id="drive-mode">--</div>
    </div>
    <div>
      <div class="cost-label">Operators</div>
      <div id="operator-count" style="color: #c9d1d9;">0</div>
    </div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>Operators</h2>
      <div id="operators"><div class="empty-state">No operators active</div></div>
    </div>
    <div class="panel">
      <h2>Activity</h2>
      <div id="activity"><div class="empty-state">Waiting for events...</div></div>
    </div>
  </div>

  <script>
    var MAX_ACTIVITY = 100;
    var activities = [];
    var operators = [];
    var currentEs = null;

    function renderOperators() {
      var el = document.getElementById('operators');
      if (operators.length === 0) {
        el.innerHTML = '<div class="empty-state">No operators active</div>';
        document.getElementById('operator-count').textContent = '0';
        return;
      }
      el.innerHTML = operators.map(function(op) {
        return '<div class="operator-card">' +
          '<span class="name">' + esc(op.name) + '</span> ' +
          '<span class="status status-' + (op.status || 'active') + '">' + (op.status || 'active') + '</span>' +
          '<div class="role">' + esc(op.role || 'operator') + '</div>' +
          (op.task ? '<div class="task">' + esc(op.task) + '</div>' : '') +
          '</div>';
      }).join('');
      document.getElementById('operator-count').textContent = operators.length;
    }

    function renderActivity() {
      var el = document.getElementById('activity');
      if (activities.length === 0) {
        el.innerHTML = '<div class="empty-state">Waiting for events...</div>';
        return;
      }
      el.innerHTML = activities.slice(0, 50).map(function(a) {
        var time = a.timestamp ? new Date(a.timestamp).toLocaleTimeString() : '';
        var agent = a.agent ? '<span class="agent-tag">[' + esc(a.agent) + ']</span>' : '';
        var msg = esc(a.text || a.message || a.path || a.type);
        return '<div class="activity-item">' +
          '<span class="time">' + time + '</span>' +
          agent + ' ' + msg +
          '</div>';
      }).join('');
    }

    function esc(s) {
      if (!s) return '';
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function connect() {
      if (currentEs) {
        currentEs.close();
        currentEs = null;
      }
      var port = window.location.port || '7891';
      var es = new EventSource('http://localhost:' + port + '/events');
      currentEs = es;

      es.onopen = function() {
        document.getElementById('connection-status').className = 'connected';
        document.getElementById('connection-status').textContent = 'Connected';
      };

      es.onerror = function() {
        document.getElementById('connection-status').className = 'disconnected';
        document.getElementById('connection-status').textContent = 'Disconnected';
        es.close();
        currentEs = null;
        setTimeout(connect, 3000);
      };

      es.onmessage = function(e) {
        try {
          var data = JSON.parse(e.data);

          if (data.type === 'init' || data.type === 'operators') {
            operators = data.operators || [];
            renderOperators();
            if (data.mode) document.getElementById('drive-mode').textContent = data.mode;
            if (data.active !== undefined) {
              document.getElementById('drive-mode').style.opacity = data.active ? '1' : '0.5';
            }
          }

          if (data.type === 'activity' || data.type === 'file' || data.type === 'decision') {
            activities.unshift(data);
            if (activities.length > MAX_ACTIVITY) activities.pop();
            renderActivity();
          }

          if (data.type === 'cost') {
            document.getElementById('session-cost').textContent = '$' + (data.totalCostUsd || 0).toFixed(4);
            document.getElementById('token-count').textContent =
              ((data.totalInputTokens || 0) + (data.totalOutputTokens || 0)).toLocaleString();
          }

          if (data.type === 'mode') {
            document.getElementById('drive-mode').textContent = data.subMode || data.mode || '--';
            if (data.active !== undefined) {
              document.getElementById('drive-mode').style.opacity = data.active ? '1' : '0.5';
            }
          }
        } catch (err) { /* ignore parse errors */ }
      };
    }

    connect();
  </script>
</body>
</html>
